services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Kafka listens on 9092 inside Docker
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  producer:
    build:
      context: ../producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SYMBOL: avaxusdt
      KAFKA_TOPIC: binance_avaxusdt_aggtrades
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BINANCE_WS_URL: wss://stream.binance.com:9443/ws/avaxusdt@aggTrade
  
  spark-minute:
    image: apache/spark:3.5.1
    user: "0:0"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - SPARK_SUBMIT_OPTS=-Divy.cache.dir=/tmp/ivy -Divy.home=/tmp/ivy
    volumes:
      - ../spark:/opt/spark-app
      - spark_data:/data
    command: >
      /opt/spark/bin/spark-submit
      --master local[*]
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      /opt/spark-app/streaming_job.py
  
  # --- Airflow (daily rollup -> BigQuery) ---
  airflow-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.9.3
    depends_on:
      - airflow-postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "pyarrow==16.1.0"
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/gcp-sa.json
      BQ_PROJECT: crypto-project-489022
      BQ_DATASET: crypto
      BQ_TABLE: avax_daily
      MINUTE_PARQUET_PATH: /data/minute
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/secret:/opt/airflow/secrets:ro
      - spark_data:/data
    command: >
      bash -c "airflow db init && airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com || true"

  airflow-webserver:
    image: apache/airflow:2.9.3
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "pyarrow==16.1.0"
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/gcp-sa.json
      BQ_PROJECT: crypto-project-489022
      BQ_DATASET: crypto
      BQ_TABLE: avax_daily
      MINUTE_PARQUET_PATH: /data/minute
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/secret:/opt/airflow/secrets:ro
      - spark_data:/data
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.3
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "pyarrow==16.1.0"
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/gcp-sa.json
      BQ_PROJECT: crypto-project-489022
      BQ_DATASET: crypto
      BQ_TABLE: avax_daily
      MINUTE_PARQUET_PATH: /data/minute
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/secret:/opt/airflow/secrets:ro
      - spark_data:/data
    command: scheduler

volumes:
  kafka_data:
  spark_data:
  airflow_pgdata:
